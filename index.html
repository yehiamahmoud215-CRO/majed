<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عرض عسل الماجد</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    /* =====================================================
       إعدادات عامة - ألوان مستوحاة من تصميم عسل الماجد
    ===================================================== */
    :root {
      --main-color: #f8e7b2;
      --accent-color: #d99a2b;
      --accent-light: #ffd36a;
      --background-color: #080604;
      --section-bg: #120d09;
      --card-bg: #1a120c;
      --text-color: #f6ead0;
      --muted-color: #c8a96b;
      --border-color: rgba(217, 154, 43, 0.45);
      --radius: 18px;
      --max-width: 1183px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, rgba(217, 154, 43, 0.16), transparent 34%),
        var(--background-color);
      color: var(--text-color);
      line-height: 1.7;
    }

    img,
    video,
    iframe {
      max-width: 100%;
      display: block;
    }

    .page-wrapper {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      background: #080604;
      overflow: hidden;
      box-shadow: 0 0 55px rgba(0, 0, 0, 0.75);
    }

    .section-padding {
      padding: 34px 18px;
    }

    /* =====================================================
       الهيدر
    ===================================================== */
    .hero-header {
      text-align: center;
      padding: 42px 18px 30px;
      background:
        linear-gradient(180deg, rgba(58, 34, 14, 0.96) 0%, rgba(8, 6, 4, 1) 100%),
        radial-gradient(circle at center, rgba(255, 211, 106, 0.22), transparent 45%);
      border-bottom: 1px solid var(--border-color);
    }

    .hero-header h1 {
      color: var(--main-color);
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      margin-bottom: 12px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
    }

    .hero-header p {
      color: var(--muted-color);
      font-size: clamp(16px, 2.5vw, 24px);
      max-width: 800px;
      margin: 0 auto;
      font-weight: 700;
    }

    /* =====================================================
       سلايدر الصور العلوي
    ===================================================== */
    .slider-section {
      background:
        linear-gradient(180deg, #080604 0%, #120d09 100%);
    }

    .swiper {
      width: 100%;
    }

    .top-image-slider {
      padding-bottom: 38px;
    }

    .top-image-slider .swiper-slide {
      border-radius: var(--radius);
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(217, 154, 43, 0.12), transparent 55%),
        var(--card-bg);
      border: 1px solid var(--border-color);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.42);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-image-slider .swiper-slide img {
      width: 100%;
      height: auto;
      max-height: 820px;
      object-fit: contain;
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: #1b1208;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--accent-light), var(--accent-color));
      box-shadow: 0 8px 24px rgba(217, 154, 43, 0.35);
      border: 1px solid rgba(255, 230, 166, 0.65);
    }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 18px;
      font-weight: bold;
    }

    .swiper-pagination-bullet {
      background: rgba(248, 231, 178, 0.55);
      opacity: 1;
    }

    .swiper-pagination-bullet-active {
      background: var(--accent-light);
    }

    /* =====================================================
       صور الوصف الطويلة
    ===================================================== */
    .description-section {
      padding: 0;
      background: #080604;
    }

    .description-images img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border: none;
    }

    .description-link {
      display: block;
      text-decoration: none;
      cursor: pointer;
    }

    /* =====================================================
       قسم فيديوهات الريفيو
    ===================================================== */
    .video-section {
      background:
        radial-gradient(circle at top, rgba(217, 154, 43, 0.16), transparent 34%),
        linear-gradient(180deg, #080604 0%, #160f09 100%);
      padding-bottom: 56px;
      overflow: hidden;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }

    .section-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .section-title h2 {
      color: var(--main-color);
      font-size: clamp(26px, 4vw, 46px);
      margin-bottom: 8px;
      font-weight: 900;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
    }

    .section-title p {
      font-size: 17px;
      color: var(--muted-color);
      font-weight: 700;
    }

    .review-video-slider {
      overflow: visible;
      padding-bottom: 42px;
    }

    .review-card {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border-color);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.5);
    }

    .review-card-content {
      width: 100%;
      height: 100%;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: pointer;
      overflow: hidden;
      background: #000;
    }

    .video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      display: none;
    }

    .video-container.active {
      display: block;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .video-thumbnail {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: opacity 0.25s ease;
    }

    .video-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-wrapper.is-playing .video-thumbnail {
      opacity: 0;
      pointer-events: none;
    }

    .video-play-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.05) 0%,
        rgba(0, 0, 0, 0.28) 100%
      );
      transition: opacity 0.25s ease;
    }

    .video-play-overlay svg {
      width: 76px;
      height: 76px;
      color: #fff;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.65));
    }

    .video-wrapper.is-playing .video-play-overlay {
      opacity: 0;
      pointer-events: none;
    }

    .review-caption {
      position: absolute;
      right: 12px;
      left: 12px;
      bottom: 12px;
      z-index: 2;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(8, 6, 4, 0.58);
      border: 1px solid rgba(255, 211, 106, 0.35);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
      pointer-events: none;
      backdrop-filter: blur(5px);
    }

    .video-wrapper.is-playing .review-caption {
      display: none;
    }

    /* =====================================================
       زر الطلب السفلي
    ===================================================== */
    .cta-section {
      text-align: center;
      padding: 34px 18px 46px;
      background:
        linear-gradient(180deg, #120d09 0%, #080604 100%);
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 36px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-light), var(--accent-color));
      color: #1b1208;
      font-size: 21px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(217, 154, 43, 0.38);
      border: 1px solid rgba(255, 230, 166, 0.65);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 42px rgba(217, 154, 43, 0.5);
    }

    @media (max-width: 768px) {
      .top-image-slider .swiper-slide img {
        max-height: 560px;
      }

      .section-padding {
        padding: 24px 12px;
      }

      .hero-header {
        padding: 32px 14px 22px;
      }

      .swiper-button-next,
      .swiper-button-prev {
        width: 36px;
        height: 36px;
      }

      .swiper-button-next::after,
      .swiper-button-prev::after {
        font-size: 14px;
      }

      .video-play-overlay svg {
        width: 64px;
        height: 64px;
      }

      .cta-button {
        width: 100%;
        font-size: 18px;
      }
    }
  </style>
</head>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    /* =====================================================
       سلايدر الصور العلوي
    ===================================================== */
    const topImageSlider = new Swiper('.top-image-slider', {
      loop: true,
      speed: 650,
      spaceBetween: 18,
      grabCursor: true,
      autoplay: {
        delay: 3500,
        disableOnInteraction: false,
      },
      pagination: {
        el: '.top-image-slider .swiper-pagination',
        clickable: true,
      },
      navigation: {
        nextEl: '.top-image-slider .swiper-button-next',
        prevEl: '.top-image-slider .swiper-button-prev',
      },
    });

    /* =====================================================
       سلايدر فيديوهات الريفيو
    ===================================================== */
    const reviewVideoSlider = new Swiper('.review-video-slider', {
      loop: false,
      speed: 650,
      spaceBetween: 16,
      grabCursor: true,
      centeredSlides: false,
      slidesPerView: 1.22,
      pagination: {
        el: '.review-video-slider .swiper-pagination',
        clickable: true,
      },
      navigation: {
        nextEl: '.review-video-slider .swiper-button-next',
        prevEl: '.review-video-slider .swiper-button-prev',
      },
      breakpoints: {
        480: {
          slidesPerView: 1.65,
        },
        768: {
          slidesPerView: 2.45,
        },
        1024: {
          slidesPerView: 3.35,
        }
      },
      on: {
        slideChange: function () {
          stopAllReviewVideos();
        }
      }
    });

    /* =====================================================
       تشغيل فيديوهات الريفيو
    ===================================================== */
    const reviewVideoWrappers = document.querySelectorAll('[data-video-handle]');

    reviewVideoWrappers.forEach((wrapper) => {
      wrapper.addEventListener('click', () => {
        playReviewVideo(wrapper);
      });
    });

    function playReviewVideo(wrapper) {
      const videoUrl = normalizeUrl(wrapper.dataset.videoUrl);
      const container = wrapper.querySelector('.video-container');

      if (!videoUrl || !container) return;
      if (wrapper.classList.contains('is-playing')) return;

      stopAllReviewVideos(wrapper);

      const video = document.createElement('video');
      video.src = videoUrl;
      video.controls = true;
      video.autoplay = true;
      video.muted = false;
      video.playsInline = true;
      video.preload = 'metadata';

      container.innerHTML = '';
      container.appendChild(video);
      container.classList.add('active');
      wrapper.classList.add('is-playing');

      video.play().catch(() => {
        video.controls = true;
      });
    }

    function stopAllReviewVideos(exceptWrapper = null) {
      reviewVideoWrappers.forEach((wrapper) => {
        if (wrapper === exceptWrapper) return;

        const container = wrapper.querySelector('.video-container');
        const video = wrapper.querySelector('video');

        if (video) {
          video.pause();
          video.remove();
        }

        if (container) {
          container.innerHTML = '';
          container.classList.remove('active');
        }

        wrapper.classList.remove('is-playing');
      });
    }

    function normalizeUrl(url) {
      if (!url) return '';
      if (url.startsWith('//')) return window.location.protocol + url;
      return url;
    }
  </script>
